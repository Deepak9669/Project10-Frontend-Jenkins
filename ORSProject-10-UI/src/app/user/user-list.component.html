<div class="container-fluid mt-3"
    style="background-image: url('assets/img/books1.jpg');
     background-size: cover;
      background-position: center;
       min-height: 100vh; padding: 20px;
        padding-bottom: 75px;">

    <!-- TITLE -->
    <h2 class="text-center text-primary mb-3">
        {{'User List' | translate}}
    </h2>

    <!-- ALERT -->
    <div *ngIf="form.error" class="alert alert-danger text-center">
        <button type="button" class="close" data-dismiss="alert">&times;</button>
        {{form.message}}
    </div>

    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
        <button type="button" class="close" data-dismiss="alert">&times;</button>
        {{form.message}}
    </div>

    <!-- SEARCH BAR -->
    <div align="center">
        <table>
            <tr>
                <td>
                    <input type="text" class="form-control" [(ngModel)]="form.searchParams.firstName"
                        placeholder="Search First Name">
                </td>

                <select class="form-control" [(ngModel)]="form.searchParams.roleId">

                    <option [ngValue]="undefined">Select Role</option>

                    <option *ngFor="let obj of form.preload.roleList" [ngValue]="obj.key">
                        {{obj.value}}
                    </option>

                </select>

                <td>
                    <button (click)="search()" class="btn btn-primary w-100">
                        Search
                    </button>
                </td>

                <!-- ✅ RESET BUTTON -->
                <td>
                    <button (click)="reset()" class="btn btn-secondary w-100">
                        Reset
                    </button>
                </td>

            </tr>
        </table>
    </div>

    <!-- TABLE -->
    <div class="table-responsive mt-3">
        <table class="table table-bordered table-hover text-center bg-white">

            <thead class="thead-dark">
                <tr>
                    <th>
                        <input type="checkbox" [(ngModel)]="isMasterSel" (change)="checkUncheckAll($event)" />
                    </th>
                    <th>S.NO</th>
                    <th>Image</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Role</th>
                    <th>Phone</th>
                    <th>DOB</th>
                    <th>Edit</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let m of form.list; let i = index">

                    <td>
                        <input #checkboxes type="checkbox" (change)="checklistUpdate()" [id]="m.id" [value]="m.id">
                    </td>

                    <td>{{(form.pageNo*5)+i+1}}</td>

                    <!-- IMAGE -->
                    <td>
                        <img *ngIf="m.imageId" [src]="'http://localhost:8081/User/profilePic/' + m.id"
                            class="img-thumbnail" width="70">

                        <img *ngIf="!m.imageId" src="assets/files/default.jpg" class="img-thumbnail" width="70">
                    </td>

                    <td>{{m.firstName}}</td>
                    <td>{{m.lastName}}</td>
                    <td>{{m.loginId}}</td>
                    <td>{{m.status}}</td>
                    <td>{{m.roleName}}</td>
                    <td>{{m.phone}}</td>
                    <td>{{m.dob | date:'dd-MM-yyyy'}}</td>

                    <td>
                        <button class="btn btn-sm btn-primary" (click)="forward('/user/' + m.id)">
                            <i class="fa fa-edit"></i>
                        </button>
                    </td>

                </tr>
            </tbody>

        </table>
    </div>
    <!-- ACTIONS + PAGINATION -->
    <div class="d-flex justify-content-between align-items-center mt-3">

        <button class="btn btn-info" (click)="previous()" [disabled]="form.pageNo == 0">
            Previous
        </button>

        <div>
            <button (click)="forward('/user')" class="btn btn-success me-2">
                Add User
            </button>

            <button (click)="deleteMany()" class="btn btn-danger">
                Delete
            </button>
        </div>

        <button class="btn btn-info" (click)="next()" [disabled]="form.nextListSize == 0">
            Next
        </button>

    </div>

</div>

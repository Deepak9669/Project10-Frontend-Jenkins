<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 25px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Report
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Report
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- REPORT ID -->
                        <label><b>Report ID *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.reportId" name="reportId"
                                placeholder="Enter Report ID">
                        </div>
                        <span class="text-danger">{{form.inputerror.reportId}}</span>

                        <!-- REPORT TYPE -->
                        <label><b>Report Type *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.reportType" name="reportType"
                                placeholder="Enter Report Type">
                        </div>
                        <span class="text-danger">{{form.inputerror.reportType}}</span>

                        <!-- GENERATED DATE -->
                        <label><b>Generated Date *</b></label>
                        <div class="input-group mb-2">
                            <input type="date" class="form-control" [(ngModel)]="form.data.generatedDate"
                                name="generatedDate">
                        </div>
                        <span class="text-danger">{{form.inputerror.generatedDate}}</span>

                        <!-- REMARKS -->
                        <label><b>Remarks</b></label>
                        <div class="input-group mb-2">
                            <textarea class="form-control" [(ngModel)]="form.data.remarks" name="remarks"
                                placeholder="Enter Remarks"></textarea>
                        </div>
                        <span class="text-danger">{{form.inputerror.remarks}}</span>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/reportlist']">
                                Report List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

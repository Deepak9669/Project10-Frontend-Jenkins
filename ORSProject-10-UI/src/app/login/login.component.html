<div class="container-fluid" style="background-image: url('assets/img/cyber.jpg');
    background-size: cover;
    background-attachment: fixed;
    min-height: 100vh;
    padding-top: 80px;">

    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-lg">
                <div class="card-body">

                    <h3 class="text-center text-primary mb-3">
                        {{'Login' | translate}}
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{ form.message }}
                    </div>

                    <form>

                        <!-- LOGIN ID -->
                        <label><b>Login ID *</b></label>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <i class="fa fa-user"></i>
                            </span>
                            <input type="text" class="form-control" [(ngModel)]="form.data.loginId" name="loginId"
                                placeholder="Enter Login ID">
                        </div>
                        <span class="text-danger">{{form.inputerror.loginId}}</span>

                        <!-- PASSWORD -->
                        <label class="mt-2"><b>Password *</b></label>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <i class="fa fa-lock"></i>
                            </span>
                            <input type="password" class="form-control" [(ngModel)]="form.data.password" name="password"
                                placeholder="Enter Password">
                        </div>
                        <span class="text-danger">{{form.inputerror.password}}</span>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <button type="button" class="btn btn-success me-2" (click)="signIn()">
                                signIn
                            </button>

                           
                        </div>

                        <!-- SIGNUP -->
                        <div class="text-center mt-3">
                            <button class="btn btn-primary" (click)="signUp()">
                                Sign Up
                            </button>
                        </div>

                        <!-- FORGOT -->
                        <div class="text-center mt-2">
                            <a [routerLink]="['/forgotpassword']">
                                <b>Forget my password?</b>
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

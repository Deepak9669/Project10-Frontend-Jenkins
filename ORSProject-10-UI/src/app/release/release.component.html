<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 25px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Release
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Release
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- RELEASE ID -->
                        <label><b>Release ID *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.releaseId" name="releaseId"
                                placeholder="Enter Release ID">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.releaseId}}</span>
                        </div>
                        <!-- RELEASE CODE -->
                        <label><b>Release Code *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.releaseCode"
                                name="releaseCode" placeholder="Enter Release Code">
                        </div>

                        <div>
                            <span class="text-danger">{{form.inputerror.releaseCode}}</span>
                        </div>
                        <!-- VERSION -->
                        <label><b>Version *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.version" name="version"
                                placeholder="Enter Version">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.version}}</span>
                        </div>
                        <!-- RELEASE DATE -->
                        <label><b>Release Date *</b></label>
                        <div class="input-group mb-2">
                            <input type="date" class="form-control" [(ngModel)]="form.data.releaseDate"
                                name="releaseDate">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.releaseDate}}</span>
                        </div>
                        <!-- STATUS -->
                        <label><b>Status *</b></label>
                        <div class="input-group mb-2">
                            <select class="form-control" [(ngModel)]="form.data.status" name="status">
                                <option value="undefined">--Select Status--</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="Deprecated">Deprecated</option>
                            </select>
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.status}}</span>
                        </div>
                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/releaselist']">
                                Release List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

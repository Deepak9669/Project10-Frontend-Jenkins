<div class="container-fluid" style="background-image: url('assets/img/lamp.jpg');
           background-size: cover;
           background-attachment: fixed;
           min-height: 100vh;
           padding-top: 70px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Decoration
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Decoration
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- THEME -->
                        <label><b>Theme *</b></label>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <i class="fa fa-paint-brush"></i>
                            </span>
                            <input type="text" class="form-control" [(ngModel)]="form.data.theme" name="theme"
                                placeholder="Enter Theme">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.theme}}</span>
                        </div>



                        <!-- VENDOR NAME -->
                        <label><b>Vendor Name *</b></label>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <i class="fa fa-user"></i>
                            </span>
                            <input type="text" class="form-control" [(ngModel)]="form.data.vendorName" name="vendorName"
                                placeholder="Enter Vendor Name">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.vendorName}}</span>
                        </div>

                        <!-- COST -->
                        <label><b>Cost *</b></label>
                        <div class="input-group mb-2">
                            <span class="input-group-text">
                                <i class="fa fa-money"></i>
                            </span>
                            <input type="number" class="form-control" [(ngModel)]="form.data.cost" name="cost"
                                placeholder="Enter Cost">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.cost}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                Save
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning me-2"
                                (click)="forward('/decorationlist')">
                                List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-secondary" (click)="reset()">
                                Reset
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed; 
     min-height: 100vh;
     padding-top: 50px;
     padding-bottom: 50px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        {{'Add City' | translate}}
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        {{'Update City' | translate}}
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- STATE -->
                        <label><b>{{'State' | translate}} *</b></label>
                        <input type="text" class="form-control mb-2" [(ngModel)]="form.data.state"
                            placeholder="Enter State" name="state">
                        <div>
                            <span class="text-danger">{{form.inputerror.state}}</span>
                        </div>

                        <!-- CITY -->
                        <label><b>{{'City' | translate}} *</b></label>
                        <input type="text" class="form-control mb-2" [(ngModel)]="form.data.city"
                            placeholder="Enter City" name="city">
                        <div>
                            <span class="text-danger">{{form.inputerror.city}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{ form.data.id ? ('Update' | translate) : ('Save' | translate) }}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/citylist']">
                                {{ 'City List' | translate }}
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                {{ 'Reset' | translate }}
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

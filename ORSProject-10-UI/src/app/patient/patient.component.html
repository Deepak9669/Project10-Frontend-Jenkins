<div class="container-fluid" style="background-image: url('assets/img/index1.jpg');
           background-size: cover;
           background-attachment: fixed;
           min-height: 100vh;
           padding-top: 70px;">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Patient
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Patient
                    </h3>

                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- PATIENT CODE -->
                        <label><b>Patient Code *</b></label>
                        <input type="text" class="form-control mb-2" [(ngModel)]="form.data.patientCode"
                            name="patientCode" placeholder="Enter Patient Code">
                        <span class="text-danger">{{form.inputerror.patientCode}}</span>

                        <!-- PATIENT NAME -->
                        <label><b>Patient Name *</b></label>
                        <input type="text" class="form-control mb-2" [(ngModel)]="form.data.patientName"
                            name="patientName" placeholder="Enter Patient Name">
                        <span class="text-danger">{{form.inputerror.patientName}}</span>

                        <!-- DISEASE -->
                        <label><b>Disease *</b></label>
                        <input type="text" class="form-control mb-2" [(ngModel)]="form.data.disease" name="disease"
                            placeholder="Enter Disease">
                        <span class="text-danger">{{form.inputerror.disease}}</span>

                        <!-- STATUS -->
                        <label><b>Status *</b></label>
                        <select class="form-control mb-2" [(ngModel)]="form.data.status" name="status">
                            <option value="undefined">----Select Status----</option>
                            <option value="Admitted">Admitted</option>
                            <option value="Discharged">Discharged</option>
                            <option value="Under Treatment">Under Treatment</option>
                        </select>
                        <span class="text-danger">{{form.inputerror.status}}</span>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <button class="btn btn-success me-2" (click)="submit()">
                                Save
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning me-2" (click)="forward('patientlist')">
                                List
                            </button>

                            <button *ngIf="!form.data.id" class="btn btn-secondary" (click)="reset()">
                                Reset
                            </button>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

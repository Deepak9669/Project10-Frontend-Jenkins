<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 25px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Supplier
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Supplier
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- SUPPLIER ID -->
                        <label><b>Supplier ID *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.supplierId"
                                name="supplierId" placeholder="Enter Supplier ID">
                        </div>
                        <span class="text-danger">{{form.inputerror.supplierId}}</span>

                        <!-- SUPPLIER CODE -->
                        <label><b>Supplier Code *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.supplierCode"
                                name="supplierCode" placeholder="Enter Supplier Code">
                        </div>
                        <span class="text-danger">{{form.inputerror.supplierCode}}</span>

                        <!-- SUPPLIER NAME -->
                        <label><b>Supplier Name *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.supplierName"
                                name="supplierName" placeholder="Enter Supplier Name">
                        </div>
                        <span class="text-danger">{{form.inputerror.supplierName}}</span>

                        <!-- CONTACT -->
                        <label><b>Contact *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.contact" name="contact"
                                placeholder="Enter Contact Number">
                        </div>
                        <span class="text-danger">{{form.inputerror.contact}}</span>

                        <!-- STATUS (STATIC PRELOAD) -->
                        <label><b>Status *</b></label>
                        <div class="input-group mb-2">
                            <select class="form-control" [(ngModel)]="form.data.status" name="status">

                                <option [ngValue]="null">Select Status</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>

                            </select>
                        </div>
                        <span class="text-danger">{{form.inputerror.status}}</span>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/supplierlist']">
                                Supplier List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

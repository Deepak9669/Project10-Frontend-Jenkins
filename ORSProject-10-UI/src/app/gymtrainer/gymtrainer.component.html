<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 25px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Gym Trainer
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Gym Trainer
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- TRAINER ID -->
                        <label><b>Trainer ID *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.trainerId" name="trainerId"
                                placeholder="Enter Trainer ID">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.trainerId}}</span>
                        </div>

                        <!-- TRAINER NAME -->
                        <label><b>Trainer Name *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.trainerName"
                                name="trainerName" placeholder="Enter Trainer Name">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.trainerName}}</span>
                        </div>

                        <!-- SPECIALIZATION -->
                        <label><b>Specialization *</b></label>
                        <div class="input-group mb-2">
                            <select class="form-control" [(ngModel)]="form.data.specialization" name="specialization">
                                <option value="undefined">--Select Specialization--</option>
                                <option value="Yoga">Yoga</option>
                                <option value="Pilates">Pilates</option>
                                <option value="Weightlifting">Weightlifting</option>
                            </select>
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.specialization}}</span>
                        </div>
                        <!-- SALARY -->
                        <label><b>Salary *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.salary" name="salary"
                                placeholder="Enter Salary">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.salary}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/gymtrainerlist']">
                                Trainer List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

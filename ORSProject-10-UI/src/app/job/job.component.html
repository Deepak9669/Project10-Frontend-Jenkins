<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed; 
     min-height: 100vh;
     padding-top: 50px;
     padding-bottom: 50px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        {{'Add Job' | translate}}
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        {{'UpdateJob' | translate}}
                    </h3>
                  
                  

                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- JOB CODE -->
                        <label><b>{{'JobCode' | translate}} *</b></label>
                        <input type="text" class="form-control mb-2" [(ngModel)]="form.data.jobCode"
                            placeholder="Enter Job Code" name="jobCode">
                        <div>
                            <span class="text-danger">{{form.inputerror.jobCode}}</span>
                        </div>
                        <!-- JOB NAME -->
                        <label><b>{{'JobName' | translate}} *</b></label>
                        <input type="text" class="form-control mb-2" [(ngModel)]="form.data.jobName"
                            placeholder="Enter Job Name" name="jobName">
                        <div>
                            <span class="text-danger">{{form.inputerror.jobName}}</span>
                        </div>
                        <label><b>{{'City' | translate}} *</b></label>
                        <div class="input-group mb-2">

                            <select class="form-control" [(ngModel)]="form.data.cityId" name="cityId">
                                <option value="undefined">----Select City----</option>
                                <option *ngFor="let obj of form.preload.cityList" [value]="obj.key">
                                    {{obj.value}}
                                </option>
                            </select>
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.cityId}}</span>
                        </div>

                        <!-- PRIORITY -->
                        <label><b>{{'Priority' | translate}} *</b></label>
                        <select class="form-control mb-2" [(ngModel)]="form.data.priority" name="priority">
                            <option value="undefined">----Select Priority----</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                        <div>
                            <span class="text-danger">{{form.inputerror.priority}}</span>
                        </div>

                        <!-- STATUS -->
                        <label><b>{{'Status' | translate}} *</b></label>
                        <select class="form-control mb-2" [(ngModel)]="form.data.status" name="status">
                            <option value="undefined">----Select Status----</option>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                        <div>
                            <span class="text-danger">{{form.inputerror.status}}</span>
                        </div>
                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{ form.data.id ? ('Update' | translate) : ('Save' | translate) }}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/joblist']">
                                {{ 'JobList' | translate }}
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                {{ 'Reset' | translate }}
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

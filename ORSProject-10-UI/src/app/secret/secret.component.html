<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 25px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Secret
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Secret
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- SECRET ID -->
                        <label><b>Secret ID *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.secretId" name="secretId"
                                placeholder="Enter Secret ID">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.secretId}}</span>
                        </div>

                        <!-- SECRET CODE -->
                        <label><b>Secret Code *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.secretCode" name="secretCode"
                                placeholder="Enter Secret Code">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.secretCode}}</span>
                        </div>

                        <!-- KEY NAME -->
                        <label><b>Key Name *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.keyName" name="keyName"
                                placeholder="Enter Key Name">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.keyName}}</span>
                        </div>

                        <!-- VALUE -->
                        <label><b>Value *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.value" name="value"
                                placeholder="Enter Value">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.value}}</span>
                        </div>

                        <!-- STATUS -->
                        <label><b>Status *</b></label>
                        <div class="input-group mb-2">
                            <select class="form-control" [(ngModel)]="form.data.status" name="status">
                                <option value="undefined">--Select Status--</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.status}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/secretlist']">
                                Secret List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

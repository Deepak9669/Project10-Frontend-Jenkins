<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 25px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Usage
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Usage
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- USAGE ID -->
                        <label><b>Usage ID *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.usageId" name="usageId"
                                placeholder="Enter Usage ID">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.usageId}}</span>
                        </div>

                        <!-- USAGE CODE -->
                        <label><b>Usage Code *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.usageCode" name="usageCode"
                                placeholder="Enter Usage Code">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.usageCode}}</span>
                        </div>

                        <!-- USER NAME -->
                        <label><b>User Name *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.userName" name="userName"
                                placeholder="Enter User Name">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.userName}}</span>
                        </div>

                        <!-- USAGE TYPE -->
                        <label><b>Usage Type *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.usageType" name="usageType"
                                placeholder="Enter Usage Type">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.usageType}}</span>
                        </div>

                        <!-- STATUS -->
                        <label><b>Status *</b></label>
                        <div class="input-group mb-2">
                            <select class="form-control" [(ngModel)]="form.data.status" name="status">
                                <option value="undefined">--Select Status--</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.status}}</span>
                        </div>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/usagelist']">
                                Usage List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

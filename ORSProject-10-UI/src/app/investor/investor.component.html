<div class="container-fluid" style="background-image: url('assets/img/email.jpg');
     background-size: cover;
     background-attachment: fixed;
     min-height: 100vh;
     padding-top: 25px;">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg">
                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Investor
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Investor
                    </h3>

                    <!-- SUCCESS MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <!-- ERROR MESSAGE -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- INVESTOR ID -->
                        <label><b>Investor ID *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.investorId"
                                name="investorId" placeholder="Enter Investor ID">
                        </div>
                        <span class="text-danger">{{form.inputerror.investorId}}</span>

                        <!-- INVESTOR NAME -->
                        <label><b>Investor Name *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.investorName"
                                name="investorName" placeholder="Enter Investor Name">
                        </div>
                        <span class="text-danger">{{form.inputerror.investorName}}</span>

                        <!-- INVESTMENT AMOUNT -->
                        <label><b>Investment Amount *</b></label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" [(ngModel)]="form.data.investmentAmount"
                                name="investmentAmount" placeholder="Enter Investment Amount">
                        </div>
                        <span class="text-danger">{{form.inputerror.investmentAmount}}</span>

                        <!-- INVESTMENT TYPE -->
                        <label><b>Investment Type *</b></label>
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" [(ngModel)]="form.data.investmentType"
                                name="investmentType" placeholder="Enter Investment Type">
                        </div>
                        <span class="text-danger">{{form.inputerror.investmentType}}</span>

                        <!-- BUTTONS -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <button *ngIf="form.data.id" class="btn btn-warning" [routerLink]="['/investorlist']">
                                Investor List
                            </button>

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

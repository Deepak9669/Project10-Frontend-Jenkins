<div class="container-fluid"
    style="background-image: url('assets/img/teah.jpg');
    background-size: cover; 
    background-attachment: fixed;
     min-height: 100vh;
      padding-top: 80px;">

    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-lg">

                <div class="card-body">

                    <!-- TITLE -->
                    <h3 class="text-center text-primary mb-3" *ngIf="!form.data.id">
                        Add Role
                    </h3>

                    <h3 class="text-center text-primary mb-3" *ngIf="form.data.id">
                        Update Role
                    </h3>

                    <!-- MESSAGE -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success text-center">

                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <div *ngIf="form.error && form.message" class="alert alert-danger text-center">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>

                    <form>

                        <!-- NAME -->
                        <label><b>Name *</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-user-alt"></i>
                                </span>
                            </div>
                            <input type="text" class="form-control" [(ngModel)]="form.data.name" name="name"
                                placeholder="Enter Role Name">
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.name}}</span>
                        </div>
                        <!-- DESCRIPTION -->
                        <label><b>Description *</b></label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fa fa-list"></i>
                                </span>
                            </div>
                            <textarea class="form-control" rows="3" [(ngModel)]="form.data.description"
                                name="description" placeholder="Enter description"></textarea>
                        </div>
                        <div>
                            <span class="text-danger">{{form.inputerror.description}}</span>
                        </div>
                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <!-- SAVE / UPDATE -->
                            <button type="button" class="btn btn-success me-2" (click)="submit()">
                                {{form.data.id ? 'Update' : 'Save'}}
                            </button>

                            <!-- 👉 CONDITION BUTTON -->

                            <!-- RESET (Update Mode) -->
                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning" (click)="reset()">
                                Reset
                            </button>

                            <!-- LIST (Add Mode) -->
                            <button *ngIf="form.data.id" class="btn btn-warning" (click)="forward('/rolelist')">
                                List
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>
